{% extends "base.html" %}

{% block title %}Valluta – Display{% endblock %}

{% block content %}
<div id="tv-layout">
    <section id="board-section" aria-label="Game board">
        <div id="game-grid" role="grid" aria-label="5 by 5 game grid"></div>
    </section>
</div>
<div id="battle-banner" hidden aria-live="polite">
    <div class="battle-name">- vs -</div>
    <div class="battle-topic"></div>
    <div class="battle-timers">00:00 · 00:00</div>
</div>
<section id="battle-question-screen" hidden aria-live="polite">
    <div id="battle-question-card">
        <img id="battle-question-image" alt="Current battle question" hidden>
        <div id="battle-question-text" hidden>—</div>
    </div>
</section>
<section id="battle-start-screen" hidden aria-live="polite">
    <div id="battle-start-card">
        <p id="battle-start-label">GET READY</p>
        <div id="battle-start-players">
            <span id="battle-start-attacker">—</span>
            <span id="battle-start-vs">vs</span>
            <span id="battle-start-defender">—</span>
        </div>
        <div id="battle-start-topic"></div>
    </div>
</section>
<section id="battle-result-screen" hidden aria-live="polite">
    <div id="battle-result-card">
        <p id="battle-result-label">ROUND OVER</p>
        <div id="battle-result-winner-row">🏆 <span id="battle-result-winner">—</span></div>
        <div id="battle-result-loser-row"><span id="battle-result-loser">—</span></div>
    </div>
</section>
<section id="winner-screen" hidden aria-live="polite">
    <div id="winner-card">
        <p id="winner-label">VÕITJA!</p>
        <h1 id="winner-name">-</h1>
    </div>
</section>
<style>
    [hidden] { display: none !important; }
    body {
        margin: 0;
        padding: 0;
        background: #050505;
        color: #ffffff;
        font-family: "Arial Black", Arial, sans-serif;
    }
    #tv-layout {
        min-height: 100vh;
        box-sizing: border-box;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
    }
    #board-section {
        display: flex;
        align-items: center;
        justify-content: center;
    }
    #game-grid {
        width: min(92vh, 92vw);
        height: min(92vh, 92vw);
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        grid-template-rows: repeat(5, 1fr);
        gap: 0;
    }
    .grid-square {
        border-radius: 0;
        border: 0.45rem solid #050505;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 0.35rem;
        font-size: clamp(1rem, 1.8vw, 1.8rem);
        line-height: 1.1;
        font-weight: 900;
        text-shadow: 0 0.15rem 0.4rem rgba(0, 0, 0, 0.85);
    }
    .battle-highlight {
        animation: battlePulse 1s infinite;
        border-color: #ffe600;
    }
    #battle-banner {
        position: fixed;
        top: 2rem;
        left: 50%;
        transform: translateX(-50%);
        min-width: 44rem;
        max-width: 88vw;
        text-align: center;
        background: rgba(0, 0, 0, 0.84);
        border: 0.28rem solid #ffe600;
        border-radius: 0.8rem;
        padding: 1.2rem 2.2rem;
        z-index: 100;
        box-shadow: 0 0 2.2rem rgba(0, 0, 0, 0.9);
    }
    #battle-question-screen {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 7rem 2rem 2rem;
        z-index: 90;
        pointer-events: none;
    }
    #battle-question-card {
        display: flex;
        align-items: center;
        justify-content: center;
        width: min(72rem, 100%);
        max-height: calc(100vh - 9rem);
        padding: 1.2rem;
        border-radius: 1.4rem;
        background: rgba(0, 0, 0, 0.86);
        border: 0.28rem solid rgba(255, 230, 0, 0.65);
        box-shadow: 0 0 2.2rem rgba(0, 0, 0, 0.85);
    }
    #battle-question-image {
        display: block;
        max-width: 100%;
        max-height: calc(100vh - 12rem);
        object-fit: contain;
        border-radius: 0.9rem;
    }
    #battle-question-text {
        font-size: clamp(2rem, 4vw, 4rem);
        font-weight: 900;
        text-align: center;
        line-height: 1.1;
        text-transform: uppercase;
    }
    #winner-screen {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        background:
            radial-gradient(circle at top, rgba(255, 255, 255, 0.18), transparent 35%),
            linear-gradient(135deg, rgba(0, 0, 0, 0.96), rgba(20, 20, 20, 0.96));
        z-index: 200;
    }
    #winner-card {
        min-width: min(54rem, 100%);
        text-align: center;
        padding: 3rem 4rem;
        border-radius: 1.4rem;
        border: 0.35rem solid var(--winner-color, #ffe600);
        background: rgba(0, 0, 0, 0.72);
        box-shadow: 0 0 3rem color-mix(in srgb, var(--winner-color, #ffe600) 45%, transparent);
    }
    #winner-label {
        margin: 0 0 1rem;
        font-size: clamp(2.8rem, 6vw, 6rem);
        font-weight: 900;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--winner-color, #ffe600);
    }
    #winner-name {
        margin: 0;
        font-size: clamp(3.4rem, 8vw, 8rem);
        line-height: 1;
        text-transform: uppercase;
        text-shadow: 0 0 1.2rem rgba(0, 0, 0, 0.8);
    }
    .battle-name {
        font-size: clamp(2rem, 4.1vw, 4.2rem);
        text-transform: uppercase;
        font-weight: 900;
        letter-spacing: 0.04em;
    }
    .battle-timers {
        margin-top: 0.45rem;
        font-size: clamp(1.4rem, 3vw, 3rem);
        color: #ffe600;
        font-weight: 900;
    }
    .battle-topic {
        margin-top: 0.3rem;
        font-size: clamp(1rem, 2vw, 2rem);
        color: #94a3b8;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.06em;
    }
    #battle-start-topic {
        margin-top: 1rem;
        font-size: clamp(1rem, 2.2vw, 2.2rem);
        color: #94a3b8;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.06em;
    }
    #battle-start-screen, #battle-result-screen {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        background: rgba(0, 0, 0, 0.88);
        z-index: 150;
    }
    #battle-start-card, #battle-result-card {
        text-align: center;
        padding: 3rem 4rem;
        border-radius: 1.4rem;
        background: rgba(0, 0, 0, 0.72);
        min-width: min(54rem, 100%);
    }
    #battle-start-card { border: 0.35rem solid #ffe600; box-shadow: 0 0 3rem rgba(255,230,0,0.25); }
    #battle-result-card { border: 0.35rem solid #475569; }

    #battle-start-label {
        margin: 0 0 1.5rem;
        font-size: clamp(2rem, 5vw, 5rem);
        font-weight: 900;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: #ffe600;
    }
    #battle-start-players {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 1.2rem;
        flex-wrap: wrap;
        font-size: clamp(2rem, 5vw, 5rem);
        font-weight: 900;
        text-transform: uppercase;
    }
    #battle-start-vs { font-size: 0.5em; color: #888; }

    #battle-result-label {
        margin: 0 0 1.5rem;
        font-size: clamp(1.4rem, 3.5vw, 3.5rem);
        font-weight: 900;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: #94a3b8;
    }
    #battle-result-winner-row {
        font-size: clamp(2rem, 4.5vw, 4.5rem);
        font-weight: 900;
        text-transform: uppercase;
        margin-bottom: 0.75rem;
    }
    #battle-result-loser-row {
        font-size: clamp(1.2rem, 2.5vw, 2.5rem);
        color: #94a3b8;
        text-transform: uppercase;
    }
    @keyframes battlePulse {
        0% {
            box-shadow: 0 0 0 0 rgba(255, 230, 0, 0.9);
        }
        70% {
            box-shadow: 0 0 0 0.85rem rgba(255, 230, 0, 0);
        }
        100% {
            box-shadow: 0 0 0 0 rgba(255, 230, 0, 0);
        }
    }
</style>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<script>
    const GRID_SIZE = 5;
    const NEUTRAL_COLOR = "#555555";
    const GAP_COLOR = "#050505";
    const BLOB_RADIUS = "0.75rem";
    const DEFAULT_WINNER_COLOR = "#ffe600";
    const tvLayout = document.getElementById("tv-layout");
    const gameGrid = document.getElementById("game-grid");
    const playersList = document.getElementById("players-list");
    const battleBanner  = document.getElementById("battle-banner");
    const battleName    = battleBanner.querySelector(".battle-name");
    const battleTopicEl = battleBanner.querySelector(".battle-topic");
    const battleTimers  = battleBanner.querySelector(".battle-timers");
    const battleQuestionScreen = document.getElementById("battle-question-screen");
    const battleQuestionImage = document.getElementById("battle-question-image");
    const battleQuestionText = document.getElementById("battle-question-text");
    const battleStartScreen = document.getElementById("battle-start-screen");
    const battleStartPlayers = document.getElementById("battle-start-players");
    const battleStartAttacker = document.getElementById("battle-start-attacker");
    const battleStartDefender = document.getElementById("battle-start-defender");
    const battleStartTopic = document.getElementById("battle-start-topic");
    const battleResultScreen = document.getElementById("battle-result-screen");
    const battleResultWinner = document.getElementById("battle-result-winner");
    const battleResultLoser = document.getElementById("battle-result-loser");
    const winnerScreen = document.getElementById("winner-screen");
    const winnerCard = document.getElementById("winner-card");
    const winnerName = document.getElementById("winner-name");
    let celebrationKey = null;
    let celebrationTimeoutId = null;
    let battleTimerInterval = null;
    let battleTimerState = null;

    const formatTimer = (ms) => {
        const total = Math.max(0, Math.floor(ms / 1000));
        return `${String(Math.floor(total / 60)).padStart(2, '0')}:${String(total % 60).padStart(2, '0')}`;
    };

    const tickBattleTimer = () => {
        if (!battleTimerState) return;
        const elapsed = performance.now() - battleTimerState.receivedAt;
        const atkMs = battleTimerState.currentTurn === 'attacker' ? Math.max(0, battleTimerState.attackerMs - elapsed) : battleTimerState.attackerMs;
        const defMs = battleTimerState.currentTurn === 'defender' ? Math.max(0, battleTimerState.defenderMs - elapsed) : battleTimerState.defenderMs;
        battleTimers.textContent = `${formatTimer(atkMs)} · ${formatTimer(defMs)}`;
    };

    const stopBattleTimer = () => {
        if (battleTimerInterval !== null) { clearInterval(battleTimerInterval); battleTimerInterval = null; }
        battleTimerState = null;
    };

    const createSquareElement = () => {
        const square = document.createElement("div");
        square.className = "grid-square";
        return square;
    };

    const ensureGrid = () => {
        if (gameGrid.childElementCount === GRID_SIZE * GRID_SIZE) {
            return;
        }

        gameGrid.innerHTML = "";
        for (let index = 0; index < GRID_SIZE * GRID_SIZE; index += 1) {
            gameGrid.appendChild(createSquareElement());
        }
    };

    const getConnectedOwnerLabelAnchors = (squaresByKey) => {
        const visited = new Set();
        const anchors = [];
        const directions = [
            [-1, 0],
            [1, 0],
            [0, -1],
            [0, 1],
        ];

        for (const [key, square] of squaresByKey.entries()) {
            const ownerId = square.owner_game_player_id;
            if (!ownerId || visited.has(key)) continue;

            const component = [];
            const queue = [key];
            let queueIndex = 0;
            visited.add(key);

            while (queueIndex < queue.length) {
                const currentKey = queue[queueIndex];
                queueIndex += 1;
                const currentSquare = squaresByKey.get(currentKey);
                if (!currentSquare || currentSquare.owner_game_player_id !== ownerId) continue;

                component.push(currentSquare);

                for (const [dr, dc] of directions) {
                    const neighborKey = `${currentSquare.row + dr}:${currentSquare.col + dc}`;
                    const neighborSquare = squaresByKey.get(neighborKey);
                    if (!neighborSquare || neighborSquare.owner_game_player_id !== ownerId || visited.has(neighborKey)) {
                        continue;
                    }
                    visited.add(neighborKey);
                    queue.push(neighborKey);
                }
            }

            if (!component.length) continue;

            const componentSize = component.length;
            const avgRow = component.reduce((sum, cell) => sum + cell.row, 0) / componentSize;
            const avgCol = component.reduce((sum, cell) => sum + cell.col, 0) / componentSize;
            let anchor = component[0];
            let bestDistance = Math.abs(anchor.row - avgRow) + Math.abs(anchor.col - avgCol);
            for (let index = 1; index < componentSize; index += 1) {
                const candidate = component[index];
                const candidateDistance = Math.abs(candidate.row - avgRow) + Math.abs(candidate.col - avgCol);
                const isBetter = candidateDistance < bestDistance
                    || (
                        candidateDistance === bestDistance
                        && (candidate.row < anchor.row || (candidate.row === anchor.row && candidate.col < anchor.col))
                    );
                if (isBetter) {
                    anchor = candidate;
                    bestDistance = candidateDistance;
                }
            }

            anchors.push({
                row: anchor.row,
                col: anchor.col,
                label: anchor.owner_name || "",
            });
        }

        return anchors;
    };

    const renderSquares = (state) => {
        ensureGrid();
        const squaresByKey = new Map(
            (state.squares || []).map((square) => [`${square.row}:${square.col}`, square])
        );
        const labelAnchors = getConnectedOwnerLabelAnchors(squaresByKey);
        const highlightedSquares = new Set(
            (state.battle?.highlight_squares || []).map((square) => `${square.row}:${square.col}`)
        );

        for (let row = 0; row < GRID_SIZE; row += 1) {
            for (let col = 0; col < GRID_SIZE; col += 1) {
                const square = squaresByKey.get(`${row}:${col}`);
                const squareEl = gameGrid.children[(row * GRID_SIZE) + col];
                const ownerColor = square?.owner_color || null;
                const color = ownerColor || NEUTRAL_COLOR;

                squareEl.style.backgroundColor = color;
                squareEl.textContent = "";
                squareEl.classList.toggle("battle-highlight", highlightedSquares.has(`${row}:${col}`));

                // Blob merging: adjacent cells with the same owner share a border
                // of their own color so the gap disappears and they form one shape.
                const neighborColor = (dr, dc) => squaresByKey.get(`${row + dr}:${col + dc}`)?.owner_color || null;
                const topColor    = neighborColor(-1,  0);
                const rightColor  = neighborColor( 0,  1);
                const bottomColor = neighborColor( 1,  0);
                const leftColor   = neighborColor( 0, -1);

                const mergeTop    = ownerColor !== null && ownerColor === topColor;
                const mergeRight  = ownerColor !== null && ownerColor === rightColor;
                const mergeBottom = ownerColor !== null && ownerColor === bottomColor;
                const mergeLeft   = ownerColor !== null && ownerColor === leftColor;

                squareEl.style.borderTopColor    = mergeTop    ? color : GAP_COLOR;
                squareEl.style.borderRightColor  = mergeRight  ? color : GAP_COLOR;
                squareEl.style.borderBottomColor = mergeBottom ? color : GAP_COLOR;
                squareEl.style.borderLeftColor   = mergeLeft   ? color : GAP_COLOR;

                // Round only the convex outer corners of each territory.
                squareEl.style.borderTopLeftRadius     = (!mergeTop    && !mergeLeft)   ? BLOB_RADIUS : "0";
                squareEl.style.borderTopRightRadius    = (!mergeTop    && !mergeRight)  ? BLOB_RADIUS : "0";
                squareEl.style.borderBottomRightRadius = (!mergeBottom && !mergeRight)  ? BLOB_RADIUS : "0";
                squareEl.style.borderBottomLeftRadius  = (!mergeBottom && !mergeLeft)   ? BLOB_RADIUS : "0";
            }
        }

        for (const { row, col, label } of labelAnchors) {
            const squareEl = gameGrid.children[(row * GRID_SIZE) + col];
            if (squareEl) {
                squareEl.textContent = label;
            }
        }
    };

    const renderBattle = (battle) => {
        battleBanner.hidden = true;
        battleQuestionScreen.hidden = true;
        battleStartScreen.hidden = true;
        battleResultScreen.hidden = true;
        battleName.hidden = false;
        battleStartPlayers.hidden = false;
        stopBattleTimer();

        if (!battle) return;

        if (battle.status === "pending") {
            battleStartPlayers.hidden = true;
            battleStartTopic.textContent = battle.defender_topic || "";
            battleStartScreen.hidden = false;
        } else if (battle.active) {
            battleName.hidden = true;
            battleTopicEl.textContent = battle.defender_topic || "";
            battleBanner.hidden = false;
            battleQuestionScreen.hidden = false;
            const imageUrl = battle.question_image_url || "";
            const fallbackText = battle.question_text || "";
            battleQuestionImage.hidden = !imageUrl;
            battleQuestionImage.src = imageUrl;
            battleQuestionText.hidden = Boolean(imageUrl) || !fallbackText;
            battleQuestionText.textContent = fallbackText || "—";

            battleTimerState = {
                attackerMs: battle.attacker_timer_ms,
                defenderMs: battle.defender_timer_ms,
                currentTurn: battle.current_turn,
                receivedAt: performance.now(),
            };
            if (battleTimerInterval === null) {
                battleTimerInterval = setInterval(tickBattleTimer, 200);
            }
            tickBattleTimer();
        } else if (battle.status === "finished") {
            const atkWon = battle.winner_name === battle.attacker.name;
            const winner = atkWon ? battle.attacker : battle.defender;
            const loser  = atkWon ? battle.defender : battle.attacker;
            battleResultWinner.textContent = `${winner.name}  ${winner.score}`;
            battleResultWinner.style.color = winner.color || "#fff";
            battleResultLoser.textContent  = `${loser.name}  ${loser.score}`;
            battleResultLoser.style.color  = loser.color || "#94a3b8";
            battleResultScreen.hidden = false;
        }
    };

    const stopCelebration = () => {
        celebrationKey = null;
        if (celebrationTimeoutId !== null) {
            clearTimeout(celebrationTimeoutId);
            celebrationTimeoutId = null;
        }
    };

    const launchCelebration = (color) => {
        if (typeof window.confetti !== "function") {
            return;
        }

        const colors = [color || DEFAULT_WINNER_COLOR, "#ffffff"];
        window.confetti({ particleCount: 180, spread: 100, startVelocity: 45, colors });
        const burst = () => {
            window.confetti({
                particleCount: 80,
                spread: 70,
                origin: { x: Math.random(), y: Math.random() * 0.35 },
                colors,
            });
        };
        burst();
        celebrationTimeoutId = window.setTimeout(burst, 600);
    };

    const renderWinner = (game) => {
        const isFinished = game && game.status === "finished" && game.winner_name;
        tvLayout.hidden = Boolean(isFinished);
        battleBanner.hidden = Boolean(isFinished);
        winnerScreen.hidden = !isFinished;
        if (!isFinished) {
            stopCelebration();
            return;
        }

        const winnerColor = game.winner_color || DEFAULT_WINNER_COLOR;
        winnerCard.style.setProperty("--winner-color", winnerColor);
        winnerName.textContent = game.winner_name;

        const nextCelebrationKey = `${game.id}:${game.winner_name}:${winnerColor}`;
        if (celebrationKey !== nextCelebrationKey) {
            stopCelebration();
            celebrationKey = nextCelebrationKey;
            launchCelebration(winnerColor);
        }
    };

    const renderState = (state) => {
        renderWinner(state.game);
        renderSquares(state);
        renderBattle(state.battle);
    };

    const GAME_ID = {{ game_id|default:"null" }};
    const WS_SCHEME = location.protocol === "https:" ? "wss" : "ws";

    if (GAME_ID) {
        const ws = new WebSocket(`${WS_SCHEME}://${location.host}/ws/game/${GAME_ID}/`);

        ws.addEventListener("message", (event) => {
            const state = JSON.parse(event.data);
            renderState(state);
        });

        ws.addEventListener("close", () => {
            stopBattleTimer();
            battleQuestionScreen.hidden = true;
            battleBanner.hidden = false;
            battleName.hidden = false;
            battleName.textContent = "Waiting for game state";
            battleTimers.textContent = "Connection closed";
        });

        ws.addEventListener("error", () => {
            stopBattleTimer();
            battleQuestionScreen.hidden = true;
            battleBanner.hidden = false;
            battleName.hidden = false;
            battleName.textContent = "Waiting for game state";
            battleTimers.textContent = "Connection issue";
        });
    } else {
        battleQuestionScreen.hidden = true;
        battleBanner.hidden = false;
        battleName.hidden = false;
        battleName.textContent = "Waiting for game state";
        battleTimers.textContent = "No active game";
    }
</script>
{% endblock %}
