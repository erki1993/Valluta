{% extends "base.html" %}

{% block title %}Valluta – Display{% endblock %}

{% block content %}
<div id="tv-layout">
    <section id="board-section" aria-label="Game board">
        <div id="game-grid" role="grid" aria-label="5 by 5 game grid"></div>
    </section>
    <aside id="sidebar" aria-label="Players">
        <h2>Players</h2>
        <div id="players-list"></div>
    </aside>
</div>
<div id="battle-banner" hidden aria-live="polite">
    <div class="battle-name">- vs -</div>
    <div class="battle-timers">00:00 · 00:00</div>
</div>
<section id="winner-screen" hidden aria-live="polite">
    <div id="winner-card">
        <p id="winner-label">VÕITJA!</p>
        <h1 id="winner-name">-</h1>
    </div>
</section>
<style>
    body {
        margin: 0;
        padding: 0;
        background: #050505;
        color: #ffffff;
        font-family: "Arial Black", Arial, sans-serif;
    }
    #tv-layout {
        min-height: 100vh;
        box-sizing: border-box;
        display: grid;
        grid-template-columns: 1fr 22rem;
        gap: 1.5rem;
        padding: 1.5rem;
    }
    #board-section {
        display: flex;
        align-items: center;
        justify-content: center;
    }
    #game-grid {
        width: min(88vh, 76vw);
        height: min(88vh, 76vw);
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        grid-template-rows: repeat(5, 1fr);
        gap: 0.65rem;
    }
    .grid-square {
        border-radius: 0.6rem;
        border: 0.32rem solid rgba(0, 0, 0, 0.6);
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 0.35rem;
        font-size: clamp(1rem, 1.8vw, 1.8rem);
        line-height: 1.1;
        font-weight: 900;
        text-shadow: 0 0.15rem 0.4rem rgba(0, 0, 0, 0.85);
        box-shadow: inset 0 0 0.5rem rgba(0, 0, 0, 0.35);
    }
    .battle-highlight {
        animation: battlePulse 1s infinite;
        border-color: #ffe600;
    }
    #sidebar {
        background: #101010;
        border: 0.22rem solid #2f2f2f;
        border-radius: 0.8rem;
        padding: 1rem;
    }
    #sidebar h2 {
        font-size: clamp(1.4rem, 2.4vw, 2.2rem);
        margin: 0 0 0.8rem;
        text-transform: uppercase;
    }
    .player-row {
        display: grid;
        grid-template-columns: 2rem 1fr auto;
        align-items: center;
        gap: 0.7rem;
        font-size: clamp(1rem, 1.5vw, 1.5rem);
        padding: 0.5rem;
        margin-bottom: 0.45rem;
        border-radius: 0.45rem;
        background: #1a1a1a;
    }
    .player-color {
        width: 1.5rem;
        height: 1.5rem;
        border-radius: 0.2rem;
        border: 0.14rem solid #ffffff;
    }
    .player-meta {
        text-align: right;
        font-size: 0.9em;
    }
    .player-eliminated {
        opacity: 0.5;
    }
    #battle-banner {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        min-width: 44rem;
        max-width: 88vw;
        text-align: center;
        background: rgba(0, 0, 0, 0.84);
        border: 0.28rem solid #ffe600;
        border-radius: 0.8rem;
        padding: 1.2rem 2.2rem;
        z-index: 100;
        box-shadow: 0 0 2.2rem rgba(0, 0, 0, 0.9);
    }
    #winner-screen {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        background:
            radial-gradient(circle at top, rgba(255, 255, 255, 0.18), transparent 35%),
            linear-gradient(135deg, rgba(0, 0, 0, 0.96), rgba(20, 20, 20, 0.96));
        z-index: 200;
    }
    #winner-card {
        min-width: min(54rem, 100%);
        text-align: center;
        padding: 3rem 4rem;
        border-radius: 1.4rem;
        border: 0.35rem solid var(--winner-color, #ffe600);
        background: rgba(0, 0, 0, 0.72);
        box-shadow: 0 0 3rem color-mix(in srgb, var(--winner-color, #ffe600) 45%, transparent);
    }
    #winner-label {
        margin: 0 0 1rem;
        font-size: clamp(2.8rem, 6vw, 6rem);
        font-weight: 900;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--winner-color, #ffe600);
    }
    #winner-name {
        margin: 0;
        font-size: clamp(3.4rem, 8vw, 8rem);
        line-height: 1;
        text-transform: uppercase;
        text-shadow: 0 0 1.2rem rgba(0, 0, 0, 0.8);
    }
    .battle-name {
        font-size: clamp(2rem, 4.1vw, 4.2rem);
        text-transform: uppercase;
        font-weight: 900;
        letter-spacing: 0.04em;
    }
    .battle-timers {
        margin-top: 0.45rem;
        font-size: clamp(1.4rem, 3vw, 3rem);
        color: #ffe600;
        font-weight: 900;
    }
    @keyframes battlePulse {
        0% {
            box-shadow: 0 0 0 0 rgba(255, 230, 0, 0.9);
        }
        70% {
            box-shadow: 0 0 0 0.85rem rgba(255, 230, 0, 0);
        }
        100% {
            box-shadow: 0 0 0 0 rgba(255, 230, 0, 0);
        }
    }
</style>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<script>
    const GRID_SIZE = 5;
    const NEUTRAL_COLOR = "#555555";
    const DEFAULT_WINNER_COLOR = "#ffe600";
    const tvLayout = document.getElementById("tv-layout");
    const gameGrid = document.getElementById("game-grid");
    const playersList = document.getElementById("players-list");
    const battleBanner = document.getElementById("battle-banner");
    const battleName = battleBanner.querySelector(".battle-name");
    const battleTimers = battleBanner.querySelector(".battle-timers");
    const winnerScreen = document.getElementById("winner-screen");
    const winnerCard = document.getElementById("winner-card");
    const winnerName = document.getElementById("winner-name");
    let celebrationKey = null;
    let celebrationTimeoutId = null;

    const createSquareElement = () => {
        const square = document.createElement("div");
        square.className = "grid-square";
        return square;
    };

    const ensureGrid = () => {
        if (gameGrid.childElementCount === GRID_SIZE * GRID_SIZE) {
            return;
        }

        gameGrid.innerHTML = "";
        for (let index = 0; index < GRID_SIZE * GRID_SIZE; index += 1) {
            gameGrid.appendChild(createSquareElement());
        }
    };

    const renderSquares = (state) => {
        ensureGrid();
        const squaresByKey = new Map(
            (state.squares || []).map((square) => [`${square.row}:${square.col}`, square])
        );
        const highlightedSquares = new Set(
            (state.battle?.highlight_squares || []).map((square) => `${square.row}:${square.col}`)
        );

        for (let row = 0; row < GRID_SIZE; row += 1) {
            for (let col = 0; col < GRID_SIZE; col += 1) {
                const square = squaresByKey.get(`${row}:${col}`);
                const squareEl = gameGrid.children[(row * GRID_SIZE) + col];
                squareEl.style.backgroundColor = square && square.owner_color ? square.owner_color : NEUTRAL_COLOR;
                squareEl.textContent = square && square.owner_name ? square.owner_name : "";
                squareEl.classList.toggle("battle-highlight", highlightedSquares.has(`${row}:${col}`));
            }
        }
    };

    const renderPlayers = (players) => {
        playersList.innerHTML = "";
        (players || []).forEach((player) => {
            const row = document.createElement("div");
            row.className = "player-row";
            if (player.is_eliminated) {
                row.classList.add("player-eliminated");
            }
            row.innerHTML = `
                <span class="player-color" style="background:${player.color};"></span>
                <span>${player.name}</span>
                <span class="player-meta">Score: ${player.score}<br>${player.is_eliminated ? "Eliminated" : "Active"}</span>
            `;
            playersList.appendChild(row);
        });
    };

    const renderBattle = (battle) => {
        if (!battle || !battle.active) {
            battleBanner.hidden = true;
            return;
        }

        battleName.textContent = `${battle.attacker_name} vs ${battle.defender_name}`;
        battleTimers.textContent = `${battle.attacker_timer} · ${battle.defender_timer}`;
        battleBanner.hidden = false;
    };

    const stopCelebration = () => {
        celebrationKey = null;
        if (celebrationTimeoutId !== null) {
            clearTimeout(celebrationTimeoutId);
            celebrationTimeoutId = null;
        }
    };

    const launchCelebration = (color) => {
        if (typeof window.confetti !== "function") {
            return;
        }

        const colors = [color || DEFAULT_WINNER_COLOR, "#ffffff"];
        window.confetti({ particleCount: 180, spread: 100, startVelocity: 45, colors });
        const burst = () => {
            window.confetti({
                particleCount: 80,
                spread: 70,
                origin: { x: Math.random(), y: Math.random() * 0.35 },
                colors,
            });
        };
        burst();
        celebrationTimeoutId = window.setTimeout(burst, 600);
    };

    const renderWinner = (game) => {
        const isFinished = game && game.status === "finished" && game.winner_name;
        tvLayout.hidden = Boolean(isFinished);
        battleBanner.hidden = Boolean(isFinished);
        winnerScreen.hidden = !isFinished;
        if (!isFinished) {
            stopCelebration();
            return;
        }

        const winnerColor = game.winner_color || DEFAULT_WINNER_COLOR;
        winnerCard.style.setProperty("--winner-color", winnerColor);
        winnerName.textContent = game.winner_name;

        const nextCelebrationKey = `${game.id}:${game.winner_name}:${winnerColor}`;
        if (celebrationKey !== nextCelebrationKey) {
            stopCelebration();
            celebrationKey = nextCelebrationKey;
            launchCelebration(winnerColor);
        }
    };

    const renderState = (state) => {
        renderWinner(state.game);
        renderSquares(state);
        renderPlayers(state.players);
        renderBattle(state.battle);
    };

    const GAME_ID = {{ game_id|default:"null" }};
    const WS_SCHEME = location.protocol === "https:" ? "wss" : "ws";

    if (GAME_ID) {
        const ws = new WebSocket(`${WS_SCHEME}://${location.host}/ws/game/${GAME_ID}/`);

        ws.addEventListener("message", (event) => {
            const state = JSON.parse(event.data);
            renderState(state);
        });

        ws.addEventListener("close", () => {
            battleBanner.hidden = false;
            battleName.textContent = "Waiting for game state";
            battleTimers.textContent = "Connection closed";
        });

        ws.addEventListener("error", () => {
            battleBanner.hidden = false;
            battleName.textContent = "Waiting for game state";
            battleTimers.textContent = "Connection issue";
        });
    } else {
        battleBanner.hidden = false;
        battleName.textContent = "Waiting for game state";
        battleTimers.textContent = "No active game";
    }
</script>
{% endblock %}
