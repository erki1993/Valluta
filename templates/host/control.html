{% extends "base.html" %}

{% block title %}Valluta – Host Control{% endblock %}

{% block content %}
<h1>Host Control Panel</h1>
<section id="game-setup-section">
    <h2>Game Setup</h2>
    <p id="setup-status-message" aria-live="polite"></p>
    <div>
        <h3>Topics</h3>
        <table id="topics-table">
            <thead>
                <tr>
                    <th>Topic</th>
                    <th>Question count</th>
                </tr>
            </thead>
            <tbody id="topics-table-body"></tbody>
        </table>
        <label for="active-topics-select">Active topics for this game</label>
        <select id="active-topics-select" multiple size="6"></select>
    </div>
    <div>
        <label for="player-count-input">Number of players</label>
        <input id="player-count-input" type="number" min="1" max="8" value="2">
    </div>
    <div id="players-config"></div>
    <button id="create-game-button" type="button">Create Game</button>
</section>

<label for="active-game-select">Active game</label>
<select id="active-game-select" {% if not active_games %}disabled{% endif %}>
    {% for game in active_games %}
    <option value="{{ game.id }}">Game {{ game.id }}</option>
    {% endfor %}
</select>

<button id="start-game-button" aria-describedby="start-game-message" {% if not active_games %}disabled{% endif %}>Start Game</button>
<p id="start-game-message" aria-live="polite"></p>
<section id="battle-section" hidden>
    <h2>Active battle</h2>
    <p id="battle-status-message" aria-live="polite"></p>
    <div id="battle-players">
        <div id="attacker-card">
            <h3>Attacker</h3>
            <p><strong id="attacker-name">-</strong></p>
            <p>Time: <span id="attacker-time">00:00</span></p>
            <p>Score: <span id="attacker-score">0</span></p>
        </div>
        <div id="defender-card">
            <h3>Defender</h3>
            <p><strong id="defender-name">-</strong></p>
            <p>Time: <span id="defender-time">00:00</span></p>
            <p>Score: <span id="defender-score">0</span></p>
        </div>
    </div>
    <p>Question: <span id="battle-question">-</span></p>
    <div>
        <button id="battle-correct-button" type="button">Correct ✓</button>
        <button id="battle-wrong-button" type="button">Wrong ✗</button>
    </div>
</section>
<style>
    #battle-players {
        display: flex;
        gap: 1rem;
        margin-bottom: 0.5rem;
    }
    #battle-players > div {
        border: 1px solid #ccc;
        border-radius: 0.25rem;
        padding: 0.5rem;
        min-width: 12rem;
    }
    .turn-active {
        border-color: #1f6feb !important;
        background: #eef5ff;
    }
    #game-setup-section {
        margin-bottom: 1rem;
        padding: 0.75rem;
        border: 1px solid #ccc;
        border-radius: 0.25rem;
    }
    #topics-table {
        margin-bottom: 0.5rem;
    }
    #topics-table th,
    #topics-table td {
        padding: 0.2rem 0.5rem;
        text-align: left;
    }
    #players-config {
        display: grid;
        gap: 0.5rem;
        margin: 0.5rem 0;
    }
    .player-config-row {
        display: grid;
        grid-template-columns: 1fr 8rem;
        gap: 0.5rem;
    }
</style>
<script>
    const setupStatusMessage = document.getElementById("setup-status-message");
    const topicsTableBody = document.getElementById("topics-table-body");
    const activeTopicsSelect = document.getElementById("active-topics-select");
    const playerCountInput = document.getElementById("player-count-input");
    const playersConfig = document.getElementById("players-config");
    const createGameButton = document.getElementById("create-game-button");
    const activeGameSelect = document.getElementById("active-game-select");
    const startGameButton = document.getElementById("start-game-button");
    const startGameMessage = document.getElementById("start-game-message");
    const battleSection = document.getElementById("battle-section");
    const battleStatusMessage = document.getElementById("battle-status-message");
    const attackerCard = document.getElementById("attacker-card");
    const defenderCard = document.getElementById("defender-card");
    const attackerName = document.getElementById("attacker-name");
    const defenderName = document.getElementById("defender-name");
    const attackerTime = document.getElementById("attacker-time");
    const defenderTime = document.getElementById("defender-time");
    const attackerScore = document.getElementById("attacker-score");
    const defenderScore = document.getElementById("defender-score");
    const battleQuestion = document.getElementById("battle-question");
    const battleCorrectButton = document.getElementById("battle-correct-button");
    const battleWrongButton = document.getElementById("battle-wrong-button");
    let ws = null;
    const defaultColors = ["#FF5733", "#33A1FF", "#7D3C98", "#27AE60", "#f59e0b", "#14b8a6", "#ec4899", "#6366f1"];

    const getCookie = (name) => {
        const cookiePrefix = `${name}=`;
        const cookieEntry = document.cookie
            .split(";")
            .map((cookie) => cookie.trim())
            .find((cookie) => cookie.startsWith(cookiePrefix));

        return cookieEntry ? cookieEntry.slice(cookiePrefix.length) : "";
    };

    const hasAvailableGames = () => activeGameSelect.options.length > 0;

    const refreshStartGameAvailability = () => {
        startGameButton.disabled = !hasAvailableGames();
        activeGameSelect.disabled = !hasAvailableGames();
        if (!hasAvailableGames()) {
            startGameMessage.textContent = "No active games available.";
        }
    };

    const getSelectedGameId = () => {
        const selectedGameId = Number(activeGameSelect.value);
        return Number.isInteger(selectedGameId) && selectedGameId > 0 ? selectedGameId : null;
    };

    const buildPlayerInputs = (count) => {
        playersConfig.innerHTML = "";
        for (let i = 0; i < count; i += 1) {
            const row = document.createElement("div");
            row.className = "player-config-row";

            const nameInput = document.createElement("input");
            nameInput.type = "text";
            nameInput.maxLength = 255;
            nameInput.value = `Player ${i + 1}`;
            nameInput.dataset.role = "name";

            const colorInput = document.createElement("input");
            colorInput.type = "color";
            colorInput.value = defaultColors[i % defaultColors.length];
            colorInput.dataset.role = "color";

            row.appendChild(nameInput);
            row.appendChild(colorInput);
            playersConfig.appendChild(row);
        }
    };

    const gatherPlayers = () =>
        Array.from(playersConfig.querySelectorAll(".player-config-row")).map((row, index) => ({
            name: (row.querySelector('[data-role="name"]').value || `Player ${index + 1}`).trim(),
            color: row.querySelector('[data-role="color"]').value || defaultColors[index % defaultColors.length],
        }));

    const selectedTopics = () =>
        Array.from(activeTopicsSelect.selectedOptions).map((option) => Number(option.value));

    const loadTopics = async () => {
        const response = await fetch("/api/topics/");
        if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
        }
        const payload = await response.json();
        const topics = payload.topics || [];

        topicsTableBody.innerHTML = "";
        activeTopicsSelect.innerHTML = "";
        topics.forEach((topic) => {
            const row = document.createElement("tr");
            row.innerHTML = `<td>${topic.name}</td><td>${topic.question_count}</td>`;
            topicsTableBody.appendChild(row);

            const option = document.createElement("option");
            option.value = topic.id;
            option.textContent = `${topic.name} (${topic.question_count})`;
            option.selected = true;
            activeTopicsSelect.appendChild(option);
        });
    };

    const addGameOption = (gameId) => {
        const option = document.createElement("option");
        option.value = String(gameId);
        option.textContent = `Game ${gameId}`;
        activeGameSelect.prepend(option);
        activeGameSelect.value = String(gameId);
        refreshStartGameAvailability();
    };

    const setBattleButtonsEnabled = (enabled) => {
        battleCorrectButton.disabled = !enabled;
        battleWrongButton.disabled = !enabled;
    };

    const renderBattleState = (state) => {
        if (!state.active) {
            battleSection.hidden = true;
            battleStatusMessage.textContent = state.status === "finished" && state.winner_name
                ? `Battle finished. Winner: ${state.winner_name}`
                : "No active battle.";
            setBattleButtonsEnabled(false);
            return;
        }

        battleSection.hidden = false;
        battleStatusMessage.textContent = "Battle in progress";
        attackerName.textContent = state.attacker.name;
        defenderName.textContent = state.defender.name;
        attackerTime.textContent = state.attacker.time_remaining;
        defenderTime.textContent = state.defender.time_remaining;
        attackerScore.textContent = state.attacker.score;
        defenderScore.textContent = state.defender.score;
        battleQuestion.textContent = state.question_text || "-";
        attackerCard.classList.toggle("turn-active", state.attacker.is_current_turn);
        defenderCard.classList.toggle("turn-active", state.defender.is_current_turn);
        setBattleButtonsEnabled(true);
    };

    const submitBattleAnswer = async (isCorrect) => {
        const selectedGameId = getSelectedGameId();
        if (!selectedGameId) {
            battleStatusMessage.textContent = "Please select an active game.";
            return;
        }

        setBattleButtonsEnabled(false);
        battleStatusMessage.textContent = "Submitting answer...";

        try {
            const response = await fetch("/api/battle/answer/", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "X-CSRFToken": decodeURIComponent(getCookie("csrftoken")),
                },
                body: JSON.stringify({ correct: isCorrect, game_id: selectedGameId }),
            });

            if (!response.ok) {
                const errorDetails = await response.text();
                throw new Error(`Request failed with status ${response.status} ${response.statusText}: ${errorDetails}`);
            }

            const state = await response.json();
            renderBattleState(state);
        } catch (error) {
            battleStatusMessage.textContent = `Failed to submit answer: ${error.message}`;
            setBattleButtonsEnabled(true);
        }
    };

    const connectWebSocket = (gameId) => {
        if (ws !== null) {
            ws.close();
            ws = null;
        }

        if (!gameId) {
            battleSection.hidden = true;
            setBattleButtonsEnabled(false);
            return;
        }

        const WS_SCHEME = location.protocol === "https:" ? "wss" : "ws";
        ws = new WebSocket(`${WS_SCHEME}://${location.host}/ws/game/${gameId}/`);

        ws.addEventListener("message", (event) => {
            const state = JSON.parse(event.data);
            renderBattleState(state.battle);
        });

        ws.addEventListener("close", () => {
            battleStatusMessage.textContent = "Connection closed. Reload to reconnect.";
            battleSection.hidden = true;
            setBattleButtonsEnabled(false);
        });

        ws.addEventListener("error", () => {
            battleStatusMessage.textContent = "Connection error.";
            battleSection.hidden = true;
            setBattleButtonsEnabled(false);
        });
    };

    createGameButton.addEventListener("click", async () => {
        const topicIds = selectedTopics();
        if (!topicIds.length) {
            setupStatusMessage.textContent = "Select at least one active topic.";
            return;
        }

        createGameButton.disabled = true;
        setupStatusMessage.textContent = "Creating game...";
        try {
            const response = await fetch("/api/game/create/", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "X-CSRFToken": decodeURIComponent(getCookie("csrftoken")),
                },
                body: JSON.stringify({
                    active_topics: topicIds,
                    players: gatherPlayers(),
                }),
            });

            if (!response.ok) {
                const errorDetails = await response.text();
                throw new Error(errorDetails || `HTTP ${response.status}`);
            }

            const payload = await response.json();
            addGameOption(payload.game_id);
            setupStatusMessage.textContent = `Game ${payload.game_id} created.`;
            startGameMessage.textContent = "";
            connectWebSocket(getSelectedGameId());
        } catch (error) {
            setupStatusMessage.textContent = `Failed to create game: ${error.message}`;
        } finally {
            createGameButton.disabled = false;
        }
    });

    playerCountInput.addEventListener("change", () => {
        const count = Math.max(1, Math.min(8, Number(playerCountInput.value) || 2));
        playerCountInput.value = String(count);
        buildPlayerInputs(count);
    });

    startGameButton.addEventListener("click", async () => {
        if (!hasAvailableGames()) {
            startGameMessage.textContent = "No active games available.";
            return;
        }

        const selectedGameId = getSelectedGameId();

        if (!selectedGameId) {
            startGameMessage.textContent = "Please select an active game.";
            return;
        }

        startGameButton.disabled = true;
        startGameMessage.textContent = "Starting game...";

        try {
            const response = await fetch("/api/game/", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "X-CSRFToken": decodeURIComponent(getCookie("csrftoken")),
                },
                body: JSON.stringify({ game_id: selectedGameId }),
            });

            if (!response.ok) {
                const errorDetails = await response.text();
                throw new Error(`Request failed with status ${response.status} ${response.statusText}: ${errorDetails}`);
            }

            startGameMessage.textContent = "Game start request sent.";
        } catch (error) {
            startGameMessage.textContent = `Failed to start game: ${error.message}`;
        } finally {
            startGameButton.disabled = !hasAvailableGames();
        }
    });

    activeGameSelect.addEventListener("change", () => {
        connectWebSocket(getSelectedGameId());
    });
    battleCorrectButton.addEventListener("click", () => submitBattleAnswer(true));
    battleWrongButton.addEventListener("click", () => submitBattleAnswer(false));
    buildPlayerInputs(Number(playerCountInput.value));
    loadTopics().catch((error) => {
        setupStatusMessage.textContent = `Failed to load topics: ${error.message}`;
    });
    refreshStartGameAvailability();
    connectWebSocket(getSelectedGameId());
</script>
{% endblock %}
