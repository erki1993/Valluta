{% extends "base.html" %}

{% block title %}Valluta – Control{% endblock %}

{% block content %}
<style>
    [hidden] { display: none !important; }

    #control-root {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1.5rem;
        align-items: start;
    }
    @media (max-width: 640px) {
        #control-root { grid-template-columns: 1fr; }
    }

    #game-header {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        flex-wrap: wrap;
        margin-bottom: 0.5rem;
    }
    #game-select { flex: 1; min-width: 8rem; font-size: 1rem; padding: 0.3rem; }

    .status-badge {
        padding: 0.2rem 0.6rem;
        border-radius: 0.25rem;
        font-size: 0.75rem;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        white-space: nowrap;
    }
    .status-badge.lobby    { background: #e2e8f0; color: #475569; }
    .status-badge.active   { background: #dcfce7; color: #166534; }
    .status-badge.finished { background: #fee2e2; color: #991b1b; }

    #start-game-btn {
        padding: 0.35rem 0.9rem;
        background: #166534;
        color: #fff;
        border: none;
        border-radius: 0.35rem;
        cursor: pointer;
        font-size: 0.9rem;
    }
    #start-game-btn:disabled { background: #86efac; cursor: default; }

    #players-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(8.5rem, 1fr));
        gap: 0.6rem;
        margin: 0.75rem 0;
    }

    .player-card {
        position: relative;
        border: 2px solid var(--player-color, #ccc);
        border-radius: 0.5rem;
        padding: 0.55rem 0.7rem;
        cursor: pointer;
        user-select: none;
        background: #fff;
        transition: transform 0.1s, box-shadow 0.1s;
    }
    .player-card:hover:not(.eliminated) {
        transform: translateY(-2px);
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    .player-card.eliminated { opacity: 0.4; cursor: default; }
    .player-card.attacker   { background: #fff7ed; box-shadow: 0 0 0 3px #f97316; }
    .player-card.defender   { background: #eff6ff; box-shadow: 0 0 0 3px #3b82f6; }
    .player-card .card-name  { font-weight: bold; color: var(--player-color, inherit); font-size: 1rem; }
    .player-card .card-score { font-size: 0.8rem; color: #64748b; margin-top: 0.15rem; }
    .card-role-tag {
        position: absolute;
        top: -0.55rem;
        right: 0.4rem;
        font-size: 0.65rem;
        font-weight: bold;
        padding: 0.1rem 0.35rem;
        border-radius: 0.2rem;
        line-height: 1.5;
    }
    .attacker .card-role-tag { background: #f97316; color: #fff; }
    .defender .card-role-tag { background: #3b82f6; color: #fff; }

    #battle-setup {
        margin-top: 0.75rem;
        padding: 0.75rem 1rem;
        border: 1px solid #e2e8f0;
        border-radius: 0.5rem;
        background: #f8fafc;
    }
    #battle-setup h3 { margin: 0 0 0.4rem; font-size: 1rem; }
    #vs-line { font-size: 0.95rem; color: #334155; margin: 0 0 0.6rem; }
    #start-battle-btn {
        padding: 0.45rem 1.2rem;
        background: #1d4ed8;
        color: #fff;
        border: none;
        border-radius: 0.4rem;
        cursor: pointer;
        font-size: 0.95rem;
    }
    #start-battle-btn:disabled { background: #93c5fd; cursor: default; }

    #finished-panel {
        grid-column: 1 / -1;
        padding: 0.75rem 1rem;
        border-radius: 0.5rem;
        background: #fefce8;
        border: 1px solid #fde047;
        display: flex;
        align-items: center;
        gap: 1rem;
        flex-wrap: wrap;
    }
    #finished-panel p { margin: 0; }
    #new-game-btn {
        padding: 0.35rem 0.9rem;
        background: #92400e;
        color: #fff;
        border: none;
        border-radius: 0.35rem;
        cursor: pointer;
    }
    #new-game-btn:disabled { background: #d97706; cursor: default; }

    /* Battle panel */
    #battle-panel { border: 1px solid #e2e8f0; border-radius: 0.5rem; padding: 1rem; background: #fff; }
    #battle-panel h2 { margin: 0 0 0.75rem; }

    /* Prematch section */
    #prematch-section { text-align: center; padding: 0.5rem 0; }
    #prematch-players { font-size: 1.1rem; font-weight: bold; color: #334155; margin: 0 0 0.75rem; }
    #begin-match-btn {
        padding: 0.6rem 2rem;
        background: #16a34a;
        color: #fff;
        border: none;
        border-radius: 0.45rem;
        cursor: pointer;
        font-size: 1.05rem;
        font-weight: bold;
    }
    #begin-match-btn:disabled { background: #86efac; cursor: default; }

    /* Active section */
    #battle-cards {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.75rem;
        margin-bottom: 0.75rem;
    }
    .battle-card {
        border: 2px solid #e2e8f0;
        border-radius: 0.5rem;
        padding: 0.6rem 0.75rem;
        background: #f8fafc;
    }
    .battle-card.turn-active { border-color: #1d4ed8; background: #eff6ff; }
    .battle-card .card-role  { font-size: 0.75rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; }
    .battle-card .card-name  { font-size: 1rem; font-weight: bold; margin: 0.2rem 0; }
    .battle-card .card-timer { font-size: 1.3rem; font-family: monospace; }
    .battle-card .card-score { font-size: 0.8rem; color: #475569; margin-top: 0.2rem; }

    #battle-question-box {
        padding: 0.6rem 0.75rem;
        background: #f1f5f9;
        border-radius: 0.4rem;
        margin-bottom: 0.75rem;
        font-size: 1rem;
        min-height: 2.2rem;
    }
    #battle-question-label {
        margin: 0 0 0.35rem;
        font-size: 0.8rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: #475569;
    }

    #answer-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    #answer-buttons button {
        padding: 0.65rem;
        font-size: 1.05rem;
        font-weight: bold;
        border: none;
        border-radius: 0.45rem;
        cursor: pointer;
    }
    #correct-btn          { background: #16a34a; color: #fff; }
    #correct-btn:disabled { background: #86efac; cursor: default; }
    #pass-btn             { background: #6b7280; color: #fff; }
    #pass-btn:disabled    { background: #d1d5db; cursor: default; }
    #pass-btn small       { font-size: 0.75em; opacity: 0.85; }

    /* Result section */
    #result-section { text-align: center; padding: 0.5rem 0; }
    #result-text { font-size: 1rem; color: #334155; margin: 0 0 0.75rem; }
    #end-match-btn {
        padding: 0.5rem 1.5rem;
        background: #64748b;
        color: #fff;
        border: none;
        border-radius: 0.45rem;
        cursor: pointer;
        font-size: 0.95rem;
        font-weight: bold;
    }
    #end-match-btn:disabled { background: #94a3b8; cursor: default; }

    .msg { font-size: 0.85rem; color: #64748b; margin: 0.4rem 0 0; min-height: 1.1em; }
    .msg.error { color: #dc2626; }
</style>

<div id="control-root">

    <section id="left-panel">
        <div id="game-header">
            <select id="game-select">
                {% for game in games %}
                <option value="{{ game.id }}" data-status="{{ game.status }}">Game {{ game.id }}</option>
                {% empty %}
                <option disabled selected>No games — create one in Admin</option>
                {% endfor %}
            </select>
            <span id="status-badge" class="status-badge"></span>
            <button id="start-game-btn" type="button" hidden>Start Game</button>
        </div>
        <p id="game-msg" class="msg" aria-live="polite"></p>

        <div id="players-panel" hidden>
            <p id="select-hint" class="msg">Select attacker, then defender.</p>
            <div id="players-grid"></div>
            <div id="battle-setup" hidden>
                <h3>Start Battle</h3>
                <p id="vs-line">—</p>
                <button id="start-battle-btn" type="button">Start Battle</button>
                <p id="battle-start-msg" class="msg" aria-live="polite"></p>
            </div>
        </div>
    </section>

    <section id="battle-panel" hidden>
        <h2>Battle</h2>

        <!-- PENDING: waiting for host to begin -->
        <div id="prematch-section" hidden>
            <p id="prematch-players">— vs —</p>
            <button id="begin-match-btn" type="button">▶ Begin Match</button>
            <p id="prematch-msg" class="msg" aria-live="polite"></p>
        </div>

        <!-- ACTIVE: battle in progress -->
        <div id="active-section" hidden>
            <div id="battle-cards">
                <div id="attacker-card" class="battle-card">
                    <div class="card-role">⚔ Attacker</div>
                    <div class="card-name" id="attacker-name">—</div>
                    <div class="card-timer" id="attacker-time">01:00</div>
                    <div class="card-score">Score: <span id="attacker-score">0</span></div>
                </div>
                <div id="defender-card" class="battle-card">
                    <div class="card-role">🛡 Defender</div>
                    <div class="card-name" id="defender-name">—</div>
                    <div class="card-timer" id="defender-time">01:00</div>
                    <div class="card-score">Score: <span id="defender-score">0</span></div>
                </div>
            </div>
            <p id="battle-question-label">Answer</p>
            <div id="battle-question-box" aria-live="polite">—</div>
            <div id="answer-buttons">
                <button id="correct-btn" type="button" disabled>✓ Correct</button>
                <button id="pass-btn" type="button" disabled>→ Pass  <small>−3s</small></button>
            </div>
        </div>

        <!-- FINISHED: show result, wait for host to dismiss -->
        <div id="result-section" hidden>
            <p id="result-text">—</p>
            <button id="end-match-btn" type="button">✕ End Match</button>
            <p id="end-match-msg" class="msg" aria-live="polite"></p>
        </div>

        <p id="battle-msg" class="msg" aria-live="polite"></p>
    </section>

    <section id="finished-panel" hidden>
        <p>🏆 Winner: <strong id="winner-name">—</strong></p>
        <button id="new-game-btn" type="button">New Game</button>
        <p id="new-game-msg" class="msg" aria-live="polite"></p>
    </section>

</div>

<script>
    const gameSelect       = document.getElementById("game-select");
    const statusBadge      = document.getElementById("status-badge");
    const startGameBtn     = document.getElementById("start-game-btn");
    const gameMsg          = document.getElementById("game-msg");
    const playersPanel     = document.getElementById("players-panel");
    const playersGrid      = document.getElementById("players-grid");
    const battleSetup      = document.getElementById("battle-setup");
    const vsLine           = document.getElementById("vs-line");
    const startBattleBtn   = document.getElementById("start-battle-btn");
    const battleStartMsg   = document.getElementById("battle-start-msg");
    const battlePanel      = document.getElementById("battle-panel");
    // Sub-sections
    const prematchSection  = document.getElementById("prematch-section");
    const prematchPlayers  = document.getElementById("prematch-players");
    const beginMatchBtn    = document.getElementById("begin-match-btn");
    const prematchMsg      = document.getElementById("prematch-msg");
    const activeSection    = document.getElementById("active-section");
    const attackerCard     = document.getElementById("attacker-card");
    const defenderCard     = document.getElementById("defender-card");
    const attackerName     = document.getElementById("attacker-name");
    const defenderName     = document.getElementById("defender-name");
    const attackerTime     = document.getElementById("attacker-time");
    const defenderTime     = document.getElementById("defender-time");
    const attackerScore    = document.getElementById("attacker-score");
    const defenderScore    = document.getElementById("defender-score");
    const battleQuestionBox = document.getElementById("battle-question-box");
    const correctBtn       = document.getElementById("correct-btn");
    const passBtn          = document.getElementById("pass-btn");
    const resultSection    = document.getElementById("result-section");
    const resultText       = document.getElementById("result-text");
    const endMatchBtn      = document.getElementById("end-match-btn");
    const endMatchMsg      = document.getElementById("end-match-msg");
    const battleMsg        = document.getElementById("battle-msg");
    const finishedPanel    = document.getElementById("finished-panel");
    const winnerName       = document.getElementById("winner-name");
    const newGameBtn       = document.getElementById("new-game-btn");
    const newGameMsg       = document.getElementById("new-game-msg");

    let ws = null;
    let selectedAttackerId = null;
    let selectedDefenderId = null;
    let playersData = [];
    let currentGameStatus = null;
    let timerInterval = null;
    let timerState = null;
    let timeoutFired = false;

    const formatTimer = (ms) => {
        const total = Math.max(0, Math.floor(ms / 1000));
        return `${String(Math.floor(total / 60)).padStart(2, '0')}:${String(total % 60).padStart(2, '0')}`;
    };

    const tickTimer = () => {
        if (!timerState) return;
        const elapsed = performance.now() - timerState.receivedAt;
        const atkMs = timerState.currentTurn === 'attacker' ? Math.max(0, timerState.attackerMs - elapsed) : timerState.attackerMs;
        const defMs = timerState.currentTurn === 'defender' ? Math.max(0, timerState.defenderMs - elapsed) : timerState.defenderMs;
        attackerTime.textContent = formatTimer(atkMs);
        defenderTime.textContent = formatTimer(defMs);

        if (!timeoutFired && (atkMs === 0 || defMs === 0)) {
            timeoutFired = true;
            const gameId = getSelectedGameId();
            if (gameId) postJson("/api/battle/timeout/", { game_id: gameId }).catch(() => {});
        }
    };

    const stopTimerCountdown = () => {
        if (timerInterval !== null) { clearInterval(timerInterval); timerInterval = null; }
        timerState = null;
        timeoutFired = false;
    };

    const getCookie = (name) => {
        const prefix = `${name}=`;
        const entry = document.cookie.split(";").map(c => c.trim()).find(c => c.startsWith(prefix));
        return entry ? entry.slice(prefix.length) : "";
    };

    const postJson = async (url, body) => {
        const res = await fetch(url, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "X-CSRFToken": decodeURIComponent(getCookie("csrftoken")),
            },
            body: JSON.stringify(body),
        });
        if (!res.ok) {
            const text = await res.text();
            throw new Error(text || `HTTP ${res.status}`);
        }
        return res.json();
    };

    const getSelectedGameId = () => {
        const val = Number(gameSelect.value);
        return Number.isInteger(val) && val > 0 ? val : null;
    };

    const getSelectedGameStatus = () => gameSelect.selectedOptions[0]?.dataset.status ?? null;

    const updateStatusBadge = (status) => {
        statusBadge.textContent = status ?? "";
        statusBadge.className = `status-badge ${status ?? ""}`;
    };

    // --- Player selection ---

    const renderPlayerCards = () => {
        playersGrid.querySelectorAll(".player-card").forEach(card => {
            const id = Number(card.dataset.gamePlayerId);
            card.classList.toggle("attacker", id === selectedAttackerId);
            card.classList.toggle("defender", id === selectedDefenderId);

            let tag = card.querySelector(".card-role-tag");
            if (!tag) {
                tag = document.createElement("span");
                tag.className = "card-role-tag";
                card.appendChild(tag);
            }
            if (id === selectedAttackerId)      { tag.textContent = "ATK"; tag.hidden = false; }
            else if (id === selectedDefenderId) { tag.textContent = "DEF"; tag.hidden = false; }
            else                                { tag.hidden = true; }
        });

        const bothSelected = selectedAttackerId !== null && selectedDefenderId !== null;
        battleSetup.hidden = !bothSelected;
        if (bothSelected) {
            const atk = playersData.find(p => p.game_player_id === selectedAttackerId);
            const def = playersData.find(p => p.game_player_id === selectedDefenderId);
            vsLine.textContent = `${atk?.name ?? "?"} ⚔ ${def?.name ?? "?"}`;
        }
    };

    const buildPlayerCards = (players) => {
        playersData = players;
        playersGrid.innerHTML = "";
        players.forEach(player => {
            const card = document.createElement("div");
            card.className = "player-card" + (player.is_eliminated ? " eliminated" : "");
            card.dataset.gamePlayerId = player.game_player_id;
            card.style.setProperty("--player-color", player.color);
            card.innerHTML = `
                <div class="card-name">${player.name}</div>
                <div class="card-score">${player.score} sq${player.is_eliminated ? " · elim." : ""}</div>
            `;
            if (!player.is_eliminated) {
                card.addEventListener("click", () => onPlayerCardClick(player.game_player_id));
            }
            playersGrid.appendChild(card);
        });
        renderPlayerCards();
    };

    const onPlayerCardClick = (id) => {
        if (id === selectedAttackerId)      { selectedAttackerId = null; }
        else if (id === selectedDefenderId) { selectedDefenderId = null; }
        else if (selectedAttackerId === null) { selectedAttackerId = id; }
        else                                { selectedDefenderId = id; }
        renderPlayerCards();
    };

    // --- WebSocket rendering ---

    const renderGameState = (state) => {
        const game = state.game;
        if (!game) return;

        currentGameStatus = game.status;

        const option = gameSelect.selectedOptions[0];
        if (option) option.dataset.status = game.status;

        updateStatusBadge(game.status);
        startGameBtn.hidden = game.status !== "lobby";
        finishedPanel.hidden = game.status !== "finished";
        winnerName.textContent = game.winner_name ?? "—";

        if (game.status === "active") buildPlayerCards(state.players);
    };

    const renderBattleState = (battle) => {
        const isPending  = battle?.status === "pending";
        const isActive   = Boolean(battle?.active);
        const isFinished = battle?.status === "finished";
        const hasBattle  = isPending || isActive || isFinished;

        battlePanel.hidden  = !hasBattle;
        playersPanel.hidden = hasBattle || currentGameStatus !== "active";

        prematchSection.hidden = !isPending;
        activeSection.hidden   = !isActive;
        resultSection.hidden   = !isFinished;

        if (isPending) {
            prematchPlayers.textContent = `${battle.attacker.name} vs ${battle.defender.name}`;
            beginMatchBtn.disabled = false;
            prematchMsg.textContent = "";
            stopTimerCountdown();
        } else if (isActive) {
            selectedAttackerId = null;
            selectedDefenderId = null;
            battleSetup.hidden = true;
            startBattleBtn.disabled = false;
            battleStartMsg.textContent = "";

            attackerName.textContent = battle.attacker.name;
            defenderName.textContent = battle.defender.name;
            attackerScore.textContent = battle.attacker.score;
            defenderScore.textContent = battle.defender.score;
            battleQuestionBox.textContent = battle.answer_text || battle.question_text || "—";
            attackerCard.classList.toggle("turn-active", battle.attacker.is_current_turn);
            defenderCard.classList.toggle("turn-active", battle.defender.is_current_turn);
            correctBtn.disabled = false;
            passBtn.disabled = false;

            timerState = {
                attackerMs: battle.attacker.time_remaining_ms,
                defenderMs: battle.defender.time_remaining_ms,
                currentTurn: battle.current_turn,
                receivedAt: performance.now(),
            };
            timeoutFired = false;
            if (timerInterval === null) timerInterval = setInterval(tickTimer, 200);
            tickTimer();
        } else if (isFinished) {
            stopTimerCountdown();
            correctBtn.disabled = true;
            passBtn.disabled = true;
            endMatchBtn.disabled = false;
            endMatchMsg.textContent = "";

            const atkWon = battle.winner_name === battle.attacker.name;
            const winner = atkWon ? battle.attacker : battle.defender;
            const loser  = atkWon ? battle.defender : battle.attacker;
            resultText.textContent = `Winner: ${winner.name} (${winner.score}) — Loser: ${loser.name} (${loser.score})`;
        } else {
            stopTimerCountdown();
            correctBtn.disabled = true;
            passBtn.disabled = true;
        }
    };

    const connectWebSocket = (gameId) => {
        if (ws) { ws.close(); ws = null; }
        if (!gameId) return;

        const scheme = location.protocol === "https:" ? "wss" : "ws";
        ws = new WebSocket(`${scheme}://${location.host}/ws/game/${gameId}/`);

        ws.addEventListener("message", (event) => {
            const state = JSON.parse(event.data);
            renderGameState(state);
            renderBattleState(state.battle);
        });
        ws.addEventListener("close", () => {
            stopTimerCountdown();
            battleMsg.textContent = "Connection closed. Reload to reconnect.";
        });
        ws.addEventListener("error", () => {
            stopTimerCountdown();
            battleMsg.textContent = "Connection error.";
        });
    };

    // --- Event handlers ---

    gameSelect.addEventListener("change", () => {
        selectedAttackerId = null;
        selectedDefenderId = null;
        gameMsg.textContent = "";
        updateStatusBadge(getSelectedGameStatus());
        startGameBtn.hidden = getSelectedGameStatus() !== "lobby";
        connectWebSocket(getSelectedGameId());
    });

    startGameBtn.addEventListener("click", async () => {
        const gameId = getSelectedGameId();
        if (!gameId) return;
        startGameBtn.disabled = true;
        gameMsg.textContent = "Starting…";
        try {
            await postJson("/api/game/", { game_id: gameId });
            gameMsg.textContent = "";
        } catch (err) {
            gameMsg.textContent = err.message;
            gameMsg.classList.add("error");
        } finally {
            startGameBtn.disabled = false;
        }
    });

    startBattleBtn.addEventListener("click", async () => {
        const gameId = getSelectedGameId();
        if (!gameId || selectedAttackerId === null || selectedDefenderId === null) return;
        startBattleBtn.disabled = true;
        battleStartMsg.textContent = "Creating battle…";
        battleStartMsg.classList.remove("error");
        try {
            await postJson("/api/battle/start/", {
                game_id: gameId,
                attacker_id: selectedAttackerId,
                defender_id: selectedDefenderId,
            });
            battleStartMsg.textContent = "";
        } catch (err) {
            battleStartMsg.textContent = err.message;
            battleStartMsg.classList.add("error");
            startBattleBtn.disabled = false;
        }
    });

    beginMatchBtn.addEventListener("click", async () => {
        const gameId = getSelectedGameId();
        if (!gameId) return;
        beginMatchBtn.disabled = true;
        prematchMsg.textContent = "Starting…";
        prematchMsg.classList.remove("error");
        try {
            await postJson("/api/battle/begin/", { game_id: gameId });
            prematchMsg.textContent = "";
        } catch (err) {
            prematchMsg.textContent = err.message;
            prematchMsg.classList.add("error");
            beginMatchBtn.disabled = false;
        }
    });

    endMatchBtn.addEventListener("click", async () => {
        const gameId = getSelectedGameId();
        if (!gameId) return;
        endMatchBtn.disabled = true;
        endMatchMsg.textContent = "Closing…";
        endMatchMsg.classList.remove("error");
        try {
            await postJson("/api/battle/close/", { game_id: gameId });
            endMatchMsg.textContent = "";
        } catch (err) {
            endMatchMsg.textContent = err.message;
            endMatchMsg.classList.add("error");
            endMatchBtn.disabled = false;
        }
    });

    const submitAnswer = async () => {
        const gameId = getSelectedGameId();
        if (!gameId) return;
        correctBtn.disabled = true;
        passBtn.disabled = true;
        battleMsg.textContent = "";
        try {
            await postJson("/api/battle/answer/", { correct: true, game_id: gameId });
        } catch (err) {
            battleMsg.textContent = err.message;
            battleMsg.classList.add("error");
            correctBtn.disabled = false;
            passBtn.disabled = false;
        }
    };

    const submitPass = async () => {
        const gameId = getSelectedGameId();
        if (!gameId) return;
        correctBtn.disabled = true;
        passBtn.disabled = true;
        battleMsg.textContent = "";
        try {
            await postJson("/api/battle/pass/", { game_id: gameId });
        } catch (err) {
            battleMsg.textContent = err.message;
            battleMsg.classList.add("error");
            correctBtn.disabled = false;
            passBtn.disabled = false;
        }
    };

    correctBtn.addEventListener("click", () => submitAnswer());
    passBtn.addEventListener("click", () => submitPass());

    newGameBtn.addEventListener("click", async () => {
        const gameId = getSelectedGameId();
        if (!gameId) return;
        newGameBtn.disabled = true;
        newGameMsg.textContent = "";
        try {
            const payload = await postJson("/api/game/new/", { game_id: gameId });
            const option = document.createElement("option");
            option.value = String(payload.game_id);
            option.textContent = `Game ${payload.game_id}`;
            option.dataset.status = "lobby";
            gameSelect.prepend(option);
            gameSelect.value = String(payload.game_id);
            gameSelect.dispatchEvent(new Event("change"));
        } catch (err) {
            newGameMsg.textContent = err.message;
            newGameMsg.classList.add("error");
        } finally {
            newGameBtn.disabled = false;
        }
    });

    // Init
    updateStatusBadge(getSelectedGameStatus());
    startGameBtn.hidden = getSelectedGameStatus() !== "lobby";
    connectWebSocket(getSelectedGameId());
</script>
{% endblock %}
